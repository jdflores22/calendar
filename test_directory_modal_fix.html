<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Directory Modal Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-2xl font-bold mb-6">Directory Modal Test</h1>
        
        <div class="bg-white p-6 rounded-lg shadow">
            <h2 class="text-lg font-semibold mb-4">Test Modal Functions</h2>
            
            <div class="space-x-4">
                <button onclick="openAddContactModal()" 
                        class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                    Add Contact Modal
                </button>
                
                <button onclick="openOfficesModal()" 
                        class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
                    Offices Modal
                </button>
                
                <button onclick="openAuditLogsModal()" 
                        class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700">
                    Audit Logs Modal
                </button>
                
                <button onclick="deleteContact(1, 'Test User', 'test-token')" 
                        class="bg-red-600 text-white px-4 py-2 rounded hover:bg-red-700">
                    Delete Modal
                </button>
            </div>
        </div>
        
        <!-- Sample Contact Card -->
        <div class="bg-white p-6 rounded-lg shadow mt-6">
            <h2 class="text-lg font-semibold mb-4">Sample Contact</h2>
            <div class="flex items-center justify-between p-4 border rounded">
                <div class="flex items-center">
                    <div class="h-12 w-12 rounded-full bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-sm">
                        <span class="text-lg font-semibold text-white">JD</span>
                    </div>
                    <div class="ml-4">
                        <h4 class="text-lg font-semibold text-gray-900">John Doe</h4>
                        <p class="text-sm text-gray-600">Software Developer</p>
                        <p class="text-sm text-gray-500">john.doe@example.com</p>
                    </div>
                </div>
                <div class="flex space-x-2">
                    <button onclick="viewContact(1)" 
                            class="px-3 py-2 text-sm text-blue-600 hover:bg-blue-50 rounded">
                        View
                    </button>
                    <button onclick="editContact(1)" 
                            class="px-3 py-2 text-sm text-indigo-600 hover:bg-indigo-50 rounded">
                        Edit
                    </button>
                    <button onclick="deleteContact(1, 'John Doe', 'test-csrf-token')" 
                            class="px-3 py-2 text-sm text-red-600 hover:bg-red-50 rounded">
                        Delete
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Add Contact Modal -->
    <div id="addContactModal" class="fixed inset-0 z-50 hidden overflow-y-auto">
        <div class="flex items-end justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" onclick="closeAddContactModal()"></div>
            <span class="hidden sm:inline-block sm:align-middle sm:h-screen">&#8203;</span>
            <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <div class="sm:flex sm:items-start">
                        <div class="mx-auto flex-shrink-0 flex items-center justify-center h-12 w-12 rounded-full bg-blue-100 sm:mx-0 sm:h-10 sm:w-10">
                            <svg class="h-6 w-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                        </div>
                        <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left w-full">
                            <h3 class="text-lg leading-6 font-medium text-gray-900">Add New Contact</h3>
                            <div class="mt-2">
                                <p class="text-sm text-gray-500">Create a new contact in the directory.</p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                    <button onclick="alert('Redirecting to contact form...')" 
                            class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-blue-600 text-base font-medium text-white hover:bg-blue-700 sm:ml-3 sm:w-auto sm:text-sm">
                        Continue to Form
                    </button>
                    <button onclick="closeAddContactModal()" 
                            class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Modal -->
    <div id="deleteModal" class="fixed inset-0 z-50 hidden overflow-y-auto">
        <div class="flex items-center justify-center min-h-screen pt-4 px-4 pb-20 text-center sm:block sm:p-0">
            <div class="fixed inset-0 bg-gray-500 bg-opacity-75 transition-opacity" onclick="closeDeleteModal()"></div>
            <div class="inline-block align-bottom bg-white rounded-lg text-left overflow-hidden shadow-xl transform transition-all sm:my-8 sm:align-middle sm:max-w-lg sm:w-full">
                <div class="bg-white px-4 pt-5 pb-4 sm:p-6 sm:pb-4">
                    <div class="sm:flex sm:items-start">
                        <div class="mx-auto flex-shrink-0 flex items-center justify-center h-12 w-12 rounded-full bg-red-100 sm:mx-0 sm:h-10 sm:w-10">
                            <svg class="h-6 w-6 text-red-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-2.5L13.732 4c-.77-.833-1.964-.833-2.732 0L3.732 16.5c-.77.833.192 2.5 1.732 2.5z"></path>
                            </svg>
                        </div>
                        <div class="mt-3 text-center sm:mt-0 sm:ml-4 sm:text-left">
                            <h3 class="text-lg leading-6 font-medium text-gray-900">Delete Contact</h3>
                            <div class="mt-2">
                                <p class="text-sm text-gray-500">
                                    Are you sure you want to delete <span id="deleteContactName" class="font-medium text-gray-900"></span>? This action cannot be undone.
                                </p>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="bg-gray-50 px-4 py-3 sm:px-6 sm:flex sm:flex-row-reverse">
                    <button onclick="confirmDelete()" 
                            class="w-full inline-flex justify-center rounded-md border border-transparent shadow-sm px-4 py-2 bg-red-600 text-base font-medium text-white hover:bg-red-700 sm:ml-3 sm:w-auto sm:text-sm">
                        Delete Contact
                    </button>
                    <button onclick="closeDeleteModal()" 
                            class="mt-3 w-full inline-flex justify-center rounded-md border border-gray-300 shadow-sm px-4 py-2 bg-white text-base font-medium text-gray-700 hover:bg-gray-50 sm:mt-0 sm:ml-3 sm:w-auto sm:text-sm">
                        Cancel
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Modal Functions
        function openAddContactModal() {
            document.getElementById('addContactModal').classList.remove('hidden');
            document.body.classList.add('overflow-hidden');
        }

        function closeAddContactModal() {
            document.getElementById('addContactModal').classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        }

        function openOfficesModal() {
            alert('Offices modal would open here');
        }

        function openAuditLogsModal() {
            alert('Audit logs modal would open here');
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').classList.add('hidden');
            document.body.classList.remove('overflow-hidden');
        }

        // Contact Actions
        function viewContact(contactId) {
            alert('Viewing contact ' + contactId);
        }

        function editContact(contactId) {
            alert('Editing contact ' + contactId);
        }

        function deleteContact(contactId, contactName, csrfToken) {
            window.deleteContactId = contactId;
            window.deleteContactName = contactName;
            window.deleteContactToken = csrfToken;
            
            document.getElementById('deleteContactName').textContent = contactName;
            document.getElementById('deleteModal').classList.remove('hidden');
            document.body.classList.add('overflow-hidden');
        }

        function confirmDelete() {
            alert('Deleting contact: ' + window.deleteContactName + ' (ID: ' + window.deleteContactId + ')');
            closeDeleteModal();
        }

        // Close modals on escape key
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                closeAddContactModal();
                closeDeleteModal();
            }
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Immediate Function Availability Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Simulate base template script loading -->
    <script>
        // Immediate global function definition - available before any other scripts
        window.toggleMobileSidebar = function() {
            const overlay = document.getElementById('mobile-sidebar-overlay');
            const panel = document.getElementById('mobile-sidebar-panel');
            
            if (!overlay || !panel) {
                console.warn('Mobile sidebar elements not found');
                return;
            }
            
            if (overlay.classList.contains('hidden')) {
                // Show sidebar
                overlay.classList.remove('hidden');
                setTimeout(() => {
                    panel.classList.remove('-translate-x-full');
                }, 10);
                document.body.classList.add('overflow-hidden');
            } else {
                // Hide sidebar
                panel.classList.add('-translate-x-full');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                }, 300);
                document.body.classList.remove('overflow-hidden');
            }
        };
        
        // Also make it available without window prefix
        function toggleMobileSidebar() {
            window.toggleMobileSidebar();
        }
        
        // Test immediately
        console.log('Function available immediately:', typeof toggleMobileSidebar === 'function');
        console.log('Window function available:', typeof window.toggleMobileSidebar === 'function');
    </script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen">
        <!-- Mobile Sidebar Overlay -->
        <div id="mobile-sidebar-overlay" class="fixed inset-0 z-40 lg:hidden hidden">
            <div class="fixed inset-0 bg-black bg-opacity-50" onclick="toggleMobileSidebar()"></div>
            <div class="fixed inset-y-0 left-0 w-64 bg-slate-900 shadow-xl transform -translate-x-full transition-transform duration-300 ease-in-out" id="mobile-sidebar-panel">
                <div class="flex flex-col h-full">
                    <div class="flex items-center justify-end p-4 border-b border-slate-800">
                        <button onclick="toggleMobileSidebar()" class="p-2 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg">
                            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                    <div class="flex-1 p-4">
                        <h3 class="text-white text-lg font-semibold mb-4">Test Sidebar</h3>
                        <ul class="space-y-2">
                            <li><a href="#" class="block text-slate-300 hover:text-white py-2">Dashboard</a></li>
                            <li><a href="#" class="block text-slate-300 hover:text-white py-2">Calendar</a></li>
                            <li><a href="#" class="block text-slate-300 hover:text-white py-2">Events</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="p-8">
            <h1 class="text-2xl font-bold mb-6">Immediate Function Availability Test</h1>
            
            <!-- Test Button -->
            <button onclick="toggleMobileSidebar()" class="lg:hidden p-2 text-slate-600 hover:text-slate-900 hover:bg-slate-200 rounded-lg transition-colors duration-200 mb-4">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>

            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-lg font-semibold mb-4">Function Availability Test</h2>
                
                <div class="space-y-4">
                    <div id="testResults" class="p-4 bg-gray-50 rounded-lg">
                        <h3 class="font-semibold mb-2">Test Results:</h3>
                        <div id="results"></div>
                    </div>
                    
                    <div class="space-x-2">
                        <button onclick="testFunction()" class="bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                            Test Function
                        </button>
                        <button onclick="testWindowFunction()" class="bg-green-600 text-white px-4 py-2 rounded hover:bg-green-700">
                            Test Window Function
                        </button>
                        <button onclick="testOnclickSimulation()" class="bg-purple-600 text-white px-4 py-2 rounded hover:bg-purple-700">
                            Test Onclick Simulation
                        </button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Test functions
        function testFunction() {
            const results = document.getElementById('results');
            try {
                toggleMobileSidebar();
                results.innerHTML += '<div class="text-green-600">✅ Direct function call successful</div>';
            } catch (error) {
                results.innerHTML += '<div class="text-red-600">❌ Direct function call failed: ' + error.message + '</div>';
            }
        }
        
        function testWindowFunction() {
            const results = document.getElementById('results');
            try {
                window.toggleMobileSidebar();
                results.innerHTML += '<div class="text-green-600">✅ Window function call successful</div>';
            } catch (error) {
                results.innerHTML += '<div class="text-red-600">❌ Window function call failed: ' + error.message + '</div>';
            }
        }
        
        function testOnclickSimulation() {
            const results = document.getElementById('results');
            try {
                // Simulate what happens in onclick attribute
                eval('toggleMobileSidebar()');
                results.innerHTML += '<div class="text-green-600">✅ Onclick simulation successful</div>';
            } catch (error) {
                results.innerHTML += '<div class="text-red-600">❌ Onclick simulation failed: ' + error.message + '</div>';
            }
        }

        // Enhanced functionality after DOM loads
        document.addEventListener('DOMContentLoaded', function() {
            const results = document.getElementById('results');
            
            // Test function availability
            if (typeof toggleMobileSidebar === 'function') {
                results.innerHTML += '<div class="text-green-600">✅ toggleMobileSidebar function is available</div>';
            } else {
                results.innerHTML += '<div class="text-red-600">❌ toggleMobileSidebar function is NOT available</div>';
            }
            
            if (typeof window.toggleMobileSidebar === 'function') {
                results.innerHTML += '<div class="text-green-600">✅ window.toggleMobileSidebar function is available</div>';
            } else {
                results.innerHTML += '<div class="text-red-600">❌ window.toggleMobileSidebar function is NOT available</div>';
            }
            
            // Add keyboard support
            document.addEventListener('keydown', function(e) {
                if (e.key === 'Escape') {
                    const overlay = document.getElementById('mobile-sidebar-overlay');
                    if (overlay && !overlay.classList.contains('hidden')) {
                        window.toggleMobileSidebar();
                    }
                }
            });
            
            console.log('Mobile sidebar function loaded and ready');
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Initialization Fix Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- CSS Loading Functions - MUST BE DEFINED BEFORE CSS LINKS -->
    <script>
    let cssLoadAttempts = 0;
    let cssLoaded = false;

    function loadFullCalendarCSSFallback() {
        cssLoadAttempts++;
        console.warn(`❌ FullCalendar CSS attempt ${cssLoadAttempts} failed`);
        
        if (cssLoadAttempts === 1) {
            // Try unpkg CDN as fallback
            console.log('🔄 Trying unpkg CDN fallback...');
            const fallbackLink = document.createElement('link');
            fallbackLink.rel = 'stylesheet';
            fallbackLink.href = 'https://unpkg.com/fullcalendar@6.1.15/index.global.min.css';
            fallbackLink.id = 'fullcalendar-css-fallback';
            fallbackLink.onerror = loadFullCalendarCSSFallback;
            fallbackLink.onload = function() {
                cssLoaded = true;
                console.log('✅ FullCalendar CSS loaded from unpkg fallback');
            };
            document.head.appendChild(fallbackLink);
        } else if (cssLoadAttempts === 2) {
            // Try cdnjs as second fallback
            console.log('🔄 Trying cdnjs fallback...');
            const fallbackLink2 = document.createElement('link');
            fallbackLink2.rel = 'stylesheet';
            fallbackLink2.href = 'https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.15/index.global.min.css';
            fallbackLink2.id = 'fullcalendar-css-fallback2';
            fallbackLink2.onerror = loadFullCalendarCSSFallback;
            fallbackLink2.onload = function() {
                cssLoaded = true;
                console.log('✅ FullCalendar CSS loaded from cdnjs fallback');
            };
            document.head.appendChild(fallbackLink2);
        } else {
            // All CDNs failed, load minimal inline styles
            console.warn('⚠️ All FullCalendar CSS CDNs failed, loading minimal inline styles');
            loadMinimalCalendarStyles();
        }
    }

    function loadMinimalCalendarStyles() {
        const style = document.createElement('style');
        style.id = 'fullcalendar-minimal-styles';
        style.textContent = `
            .fc { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; }
            .fc-header-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding: 1rem; background: #f8fafc; border-radius: 0.5rem; }
            .fc-toolbar-chunk { display: flex; align-items: center; gap: 0.5rem; }
            .fc-button { padding: 0.5rem 1rem; background: #3b82f6; color: white; border: none; border-radius: 0.375rem; cursor: pointer; font-size: 0.875rem; }
            .fc-button:hover { background: #2563eb; }
            .fc-daygrid-table { width: 100%; border-collapse: collapse; }
            .fc-col-header-cell { background: #f1f5f9; padding: 0.75rem; text-align: center; font-weight: 600; border: 1px solid #e2e8f0; }
            .fc-daygrid-day { border: 1px solid #e2e8f0; min-height: 100px; vertical-align: top; position: relative; }
            .fc-event { background: #3b82f6; color: white; padding: 0.25rem 0.5rem; margin: 0.125rem; border-radius: 0.25rem; font-size: 0.75rem; cursor: pointer; border: none; }
        `;
        document.head.appendChild(style);
        cssLoaded = true;
        console.log('✅ Minimal FullCalendar styles loaded as fallback');
    }
    </script>

    <!-- FullCalendar CSS with Multiple Fallbacks -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css' rel='stylesheet' id='fullcalendar-css-primary' 
          onerror="loadFullCalendarCSSFallback()" />
</head>
<body class="bg-gray-50">
    <div class="container mx-auto p-8">
        <h1 class="text-3xl font-bold mb-6">Calendar Initialization Fix Test</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Test Results -->
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-semibold mb-4">Test Results</h2>
                <div id="testResults" class="space-y-2">
                    <div class="text-gray-500">Running tests...</div>
                </div>
            </div>
            
            <!-- Calendar Container -->
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-semibold mb-4">Calendar</h2>
                <div id="calendar"></div>
            </div>
        </div>
    </div>

    <!-- FullCalendar JavaScript with Fallbacks -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js' 
            onerror="loadFullCalendarJSFallback()" id="fullcalendar-js-primary"></script>

    <script>
    let jsLoadAttempts = 0;
    let jsLoaded = false;

    function loadFullCalendarJSFallback() {
        jsLoadAttempts++;
        console.warn(`❌ FullCalendar JS attempt ${jsLoadAttempts} failed`);
        
        if (jsLoadAttempts === 1) {
            console.log('🔄 Trying unpkg CDN for JS...');
            const fallbackScript = document.createElement('script');
            fallbackScript.src = 'https://unpkg.com/fullcalendar@6.1.15/index.global.min.js';
            fallbackScript.onerror = loadFullCalendarJSFallback;
            fallbackScript.onload = function() {
                jsLoaded = true;
                console.log('✅ FullCalendar JS loaded from unpkg fallback');
                initializeCalendar();
            };
            document.head.appendChild(fallbackScript);
        } else if (jsLoadAttempts === 2) {
            console.log('🔄 Trying cdnjs for JS...');
            const fallbackScript2 = document.createElement('script');
            fallbackScript2.src = 'https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.15/index.global.min.js';
            fallbackScript2.onerror = function() {
                console.error('❌ All FullCalendar JS CDNs failed');
                showJSLoadingError();
            };
            fallbackScript2.onload = function() {
                jsLoaded = true;
                console.log('✅ FullCalendar JS loaded from cdnjs fallback');
                initializeCalendar();
            };
            document.head.appendChild(fallbackScript2);
        } else {
            showJSLoadingError();
        }
    }

    function showJSLoadingError() {
        const calendarEl = document.getElementById('calendar');
        if (calendarEl) {
            calendarEl.innerHTML = `
                <div class="p-4 bg-red-50 border border-red-200 rounded-lg text-center">
                    <div class="text-red-600 font-medium">Calendar Unavailable</div>
                    <p class="text-sm text-red-600 mt-2">Unable to load calendar functionality.</p>
                </div>
            `;
        }
    }

    function initializeFullCalendar() {
        const calendarEl = document.getElementById('calendar');
        
        if (!calendarEl) {
            console.error('Calendar element not found');
            return;
        }
        
        if (typeof FullCalendar === 'undefined') {
            console.error('FullCalendar library not loaded');
            return;
        }

        try {
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth'
                },
                events: [
                    {
                        title: 'Test Event',
                        start: new Date().toISOString().split('T')[0],
                        color: '#3B82F6'
                    }
                ]
            });

            calendar.render();
            console.log('✅ Calendar initialized successfully');
            updateTestResults('✅ Calendar initialized successfully', 'success');
        } catch (error) {
            console.error('❌ Calendar initialization failed:', error);
            updateTestResults('❌ Calendar initialization failed: ' + error.message, 'error');
        }
    }

    function initializeCalendar() {
        if (typeof FullCalendar === 'undefined') {
            console.error('❌ FullCalendar not available for initialization');
            return;
        }
        
        console.log('✅ Initializing FullCalendar from fallback...');
        initializeFullCalendar();
    }

    function updateTestResults(message, type) {
        const results = document.getElementById('testResults');
        const div = document.createElement('div');
        div.className = type === 'success' ? 'text-green-600' : type === 'error' ? 'text-red-600' : 'text-blue-600';
        div.textContent = message;
        results.appendChild(div);
    }

    // Run tests
    document.addEventListener('DOMContentLoaded', function() {
        updateTestResults('🧪 Starting calendar initialization tests...', 'info');
        
        // Test function availability
        const functions = [
            'loadFullCalendarCSSFallback',
            'loadMinimalCalendarStyles',
            'loadFullCalendarJSFallback',
            'initializeFullCalendar',
            'initializeCalendar'
        ];
        
        functions.forEach(funcName => {
            if (typeof window[funcName] === 'function') {
                updateTestResults(`✅ Function ${funcName} is defined`, 'success');
            } else {
                updateTestResults(`❌ Function ${funcName} is NOT defined`, 'error');
            }
        });
        
        // Check primary JS load
        const primaryJS = document.getElementById('fullcalendar-js-primary');
        
        primaryJS.addEventListener('load', function() {
            jsLoaded = true;
            console.log('✅ FullCalendar JS loaded successfully from jsdelivr');
            updateTestResults('✅ Primary FullCalendar JS loaded', 'success');
            initializeCalendar();
        });
        
        // Fallback check for JS loading
        setTimeout(function() {
            if (!jsLoaded && typeof FullCalendar === 'undefined') {
                console.warn('⚠️ FullCalendar JS not detected, triggering fallback');
                updateTestResults('⚠️ Primary JS failed, trying fallback...', 'info');
                loadFullCalendarJSFallback();
            } else if (typeof FullCalendar !== 'undefined') {
                jsLoaded = true;
                console.log('✅ FullCalendar JS verified as loaded');
                updateTestResults('✅ FullCalendar JS verified', 'success');
                initializeCalendar();
            }
        }, 2000);
        
        // CSS verification
        setTimeout(function() {
            if (!cssLoaded) {
                console.warn('⚠️ CSS load verification failed, checking styles...');
                updateTestResults('⚠️ CSS verification failed, checking...', 'info');
                
                const testElement = document.createElement('div');
                testElement.className = 'fc-event';
                testElement.style.position = 'absolute';
                testElement.style.visibility = 'hidden';
                testElement.style.top = '-9999px';
                document.body.appendChild(testElement);
                
                const computedStyle = window.getComputedStyle(testElement);
                const hasStyles = computedStyle.padding !== '0px' || computedStyle.margin !== '0px';
                
                document.body.removeChild(testElement);
                
                if (!hasStyles) {
                    console.warn('⚠️ FullCalendar styles not detected, triggering fallback');
                    updateTestResults('⚠️ CSS styles not detected, loading fallback...', 'info');
                    loadFullCalendarCSSFallback();
                } else {
                    cssLoaded = true;
                    console.log('✅ FullCalendar CSS verified as working');
                    updateTestResults('✅ FullCalendar CSS verified', 'success');
                }
            } else {
                updateTestResults('✅ FullCalendar CSS loaded', 'success');
            }
        }, 3000);
    });
    </script>
</body>
</html>

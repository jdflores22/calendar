<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DateTime Local Input Test</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test-case { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        input { margin: 10px 0; padding: 5px; }
        .info { color: #666; font-size: 14px; }
    </style>
</head>
<body>
    <h1>DateTime Local Input Timezone Test</h1>
    
    <div class="test-case">
        <h3>Test Case 1: Event 68 Times</h3>
        <p class="info">Database UTC: 2026-02-19 18:00:00 → Philippines: 2026-02-20 02:00:00</p>
        
        <label>Start Time (should show 2:00 AM):</label><br>
        <input type="datetime-local" value="2026-02-20T02:00" id="start1">
        <p class="info">Value: 2026-02-20T02:00</p>
        
        <label>End Time (should show 4:00 AM):</label><br>
        <input type="datetime-local" value="2026-02-23T04:00" id="end1">
        <p class="info">Value: 2026-02-23T04:00</p>
    </div>
    
    <div class="test-case">
        <h3>Test Case 2: Different Time Values</h3>
        
        <label>12:00 PM (noon):</label><br>
        <input type="datetime-local" value="2026-02-20T12:00" id="noon">
        <p class="info">Value: 2026-02-20T12:00</p>
        
        <label>12:00 AM (midnight):</label><br>
        <input type="datetime-local" value="2026-02-20T00:00" id="midnight">
        <p class="info">Value: 2026-02-20T00:00</p>
    </div>
    
    <div class="test-case">
        <h3>Browser Information</h3>
        <p id="timezone-info"></p>
        <p id="current-time"></p>
    </div>
    
    <script>
        // Display browser timezone information
        const now = new Date();
        document.getElementById('timezone-info').innerHTML = 
            'Browser Timezone: ' + Intl.DateTimeFormat().resolvedOptions().timeZone + 
            ' (Offset: ' + now.getTimezoneOffset() + ' minutes)';
        
        document.getElementById('current-time').innerHTML = 
            'Current Time: ' + now.toLocaleString();
        
        // Log input values to console
        console.log('Start input value:', document.getElementById('start1').value);
        console.log('End input value:', document.getElementById('end1').value);
        console.log('Browser timezone:', Intl.DateTimeFormat().resolvedOptions().timeZone);
        
        // Test what the browser shows for the datetime values
        const testDate1 = new Date('2026-02-20T02:00');
        const testDate2 = new Date('2026-02-23T04:00');
        
        console.log('Test Date 1 (2026-02-20T02:00):', testDate1.toLocaleString());
        console.log('Test Date 2 (2026-02-23T04:00):', testDate2.toLocaleString());
    </script>
</body>
</html>

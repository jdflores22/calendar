<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CORB-Resistant Loading Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50">
    <div class="container mx-auto p-8">
        <h1 class="text-3xl font-bold mb-6">CORB-Resistant Loading Test</h1>
        
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <!-- Test Results -->
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-semibold mb-4">Loading Status</h2>
                <div id="loadingStatus" class="space-y-2">
                    <div class="text-gray-500">Initializing...</div>
                </div>
            </div>
            
            <!-- Calendar Container -->
            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-xl font-semibold mb-4">Calendar</h2>
                <div id="calendar" class="min-h-[300px]">
                    <div class="flex items-center justify-center h-64 text-gray-500">
                        <div class="text-center">
                            <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-blue-600 mx-auto mb-2"></div>
                            <div>Loading calendar...</div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
    // CSS Loading Functions
    let cssLoadAttempts = 0;
    let cssLoaded = false;

    function loadMinimalCalendarStyles() {
        const style = document.createElement('style');
        style.id = 'fullcalendar-minimal-styles';
        style.textContent = `
            .fc { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; font-size: 14px; }
            .fc-header-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem; padding: 1rem; background: #f8fafc; border-radius: 0.5rem; }
            .fc-toolbar-chunk { display: flex; align-items: center; gap: 0.5rem; }
            .fc-button { padding: 0.5rem 1rem; background: #3b82f6; color: white; border: none; border-radius: 0.375rem; cursor: pointer; font-size: 0.875rem; }
            .fc-button:hover { background: #2563eb; }
            .fc-daygrid-table { width: 100%; border-collapse: collapse; }
            .fc-col-header-cell { background: #f1f5f9; padding: 0.75rem; text-align: center; font-weight: 600; border: 1px solid #e2e8f0; }
            .fc-daygrid-day { border: 1px solid #e2e8f0; min-height: 100px; vertical-align: top; position: relative; }
            .fc-event { background: #3b82f6; color: white; padding: 0.25rem 0.5rem; margin: 0.125rem; border-radius: 0.25rem; font-size: 0.75rem; cursor: pointer; border: none; }
        `;
        document.head.appendChild(style);
        cssLoaded = true;
        updateStatus('✅ Minimal FullCalendar styles loaded as fallback', 'success');
    }

    // CORB-resistant CSS loading approach
    function loadFullCalendarCSS() {
        const cssUrls = [
            'https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css',
            'https://unpkg.com/fullcalendar@6.1.15/index.global.min.css',
            'https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.15/index.global.min.css'
        ];
        
        let attemptCount = 0;
        
        function tryLoadCSS(urlIndex = 0) {
            if (urlIndex >= cssUrls.length) {
                updateStatus('⚠️ All FullCalendar CSS CDNs failed, loading minimal styles', 'warning');
                loadMinimalCalendarStyles();
                return;
            }
            
            attemptCount++;
            const url = cssUrls[urlIndex];
            updateStatus(`🔄 Attempting to load CSS from: ${url.split('/')[2]} (attempt ${attemptCount})`, 'info');
            
            // Create link element
            const link = document.createElement('link');
            link.rel = 'stylesheet';
            link.href = url;
            link.id = `fullcalendar-css-${urlIndex}`;
            
            // Set up load success handler
            link.onload = function() {
                cssLoaded = true;
                updateStatus(`✅ FullCalendar CSS loaded successfully from: ${url.split('/')[2]}`, 'success');
            };
            
            // Set up error handler
            link.onerror = function() {
                updateStatus(`❌ Failed to load CSS from: ${url.split('/')[2]}`, 'error');
                // Remove failed link
                if (link.parentNode) {
                    link.parentNode.removeChild(link);
                }
                // Try next URL
                setTimeout(() => tryLoadCSS(urlIndex + 1), 100);
            };
            
            // Add to document
            document.head.appendChild(link);
            
            // Timeout fallback in case onload/onerror don't fire (CORB issue)
            setTimeout(() => {
                if (!cssLoaded) {
                    updateStatus(`⏰ CSS load timeout for: ${url.split('/')[2]}, checking styles...`, 'warning');
                    // Check if styles are actually applied
                    const testElement = document.createElement('div');
                    testElement.className = 'fc-event';
                    testElement.style.position = 'absolute';
                    testElement.style.visibility = 'hidden';
                    testElement.style.top = '-9999px';
                    document.body.appendChild(testElement);
                    
                    const computedStyle = window.getComputedStyle(testElement);
                    const hasStyles = computedStyle.padding !== '0px' || computedStyle.margin !== '0px';
                    
                    document.body.removeChild(testElement);
                    
                    if (hasStyles) {
                        cssLoaded = true;
                        updateStatus(`✅ CSS verified as loaded from: ${url.split('/')[2]}`, 'success');
                    } else {
                        // Remove failed link and try next
                        if (link.parentNode) {
                            link.parentNode.removeChild(link);
                        }
                        tryLoadCSS(urlIndex + 1);
                    }
                }
            }, 3000);
        }
        
        // Start loading
        tryLoadCSS();
    }

    // CORB-resistant JavaScript loading approach
    function loadFullCalendarJS() {
        const jsUrls = [
            'https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js',
            'https://unpkg.com/fullcalendar@6.1.15/index.global.min.js',
            'https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.15/index.global.min.js'
        ];
        
        let jsLoaded = false;
        let attemptCount = 0;
        
        function tryLoadJS(urlIndex = 0) {
            if (urlIndex >= jsUrls.length) {
                updateStatus('❌ All FullCalendar JS CDNs failed', 'error');
                showJSLoadingError();
                return;
            }
            
            attemptCount++;
            const url = jsUrls[urlIndex];
            updateStatus(`🔄 Attempting to load JS from: ${url.split('/')[2]} (attempt ${attemptCount})`, 'info');
            
            // Create script element
            const script = document.createElement('script');
            script.src = url;
            script.id = `fullcalendar-js-${urlIndex}`;
            
            // Set up load success handler
            script.onload = function() {
                jsLoaded = true;
                updateStatus(`✅ FullCalendar JS loaded successfully from: ${url.split('/')[2]}`, 'success');
                initializeCalendar();
            };
            
            // Set up error handler
            script.onerror = function() {
                updateStatus(`❌ Failed to load JS from: ${url.split('/')[2]}`, 'error');
                // Remove failed script
                if (script.parentNode) {
                    script.parentNode.removeChild(script);
                }
                // Try next URL
                setTimeout(() => tryLoadJS(urlIndex + 1), 100);
            };
            
            // Add to document
            document.head.appendChild(script);
            
            // Timeout fallback in case onload/onerror don't fire (CORB issue)
            setTimeout(() => {
                if (!jsLoaded && typeof FullCalendar === 'undefined') {
                    updateStatus(`⏰ JS load timeout for: ${url.split('/')[2]}`, 'warning');
                    // Remove failed script and try next
                    if (script.parentNode) {
                        script.parentNode.removeChild(script);
                    }
                    tryLoadJS(urlIndex + 1);
                } else if (typeof FullCalendar !== 'undefined' && !jsLoaded) {
                    jsLoaded = true;
                    updateStatus(`✅ JS verified as loaded from: ${url.split('/')[2]}`, 'success');
                    initializeCalendar();
                }
            }, 5000);
        }
        
        // Start loading
        tryLoadJS();
    }

    function showJSLoadingError() {
        const calendarEl = document.getElementById('calendar');
        if (calendarEl) {
            calendarEl.innerHTML = `
                <div class="p-4 bg-red-50 border border-red-200 rounded-lg text-center">
                    <div class="text-red-600 font-medium">Calendar Unavailable</div>
                    <p class="text-sm text-red-600 mt-2">Unable to load calendar functionality.</p>
                    <button onclick="location.reload()" class="mt-3 px-3 py-1 bg-red-600 text-white rounded text-sm hover:bg-red-700">
                        Retry
                    </button>
                </div>
            `;
        }
    }

    function initializeCalendar() {
        if (typeof FullCalendar === 'undefined') {
            updateStatus('❌ FullCalendar not available for initialization', 'error');
            return;
        }
        
        updateStatus('✅ Initializing FullCalendar...', 'success');
        
        try {
            const calendarEl = document.getElementById('calendar');
            const calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                headerToolbar: {
                    left: 'prev,next today',
                    center: 'title',
                    right: 'dayGridMonth'
                },
                events: [
                    {
                        title: 'Test Event',
                        start: new Date().toISOString().split('T')[0],
                        color: '#3B82F6'
                    }
                ]
            });

            calendar.render();
            updateStatus('✅ Calendar initialized and rendered successfully', 'success');
        } catch (error) {
            updateStatus('❌ Calendar initialization failed: ' + error.message, 'error');
        }
    }

    function updateStatus(message, type) {
        const status = document.getElementById('loadingStatus');
        const div = document.createElement('div');
        div.className = type === 'success' ? 'text-green-600' : 
                       type === 'error' ? 'text-red-600' : 
                       type === 'warning' ? 'text-yellow-600' : 'text-blue-600';
        div.textContent = message;
        status.appendChild(div);
        
        // Keep only last 10 messages
        while (status.children.length > 10) {
            status.removeChild(status.firstChild);
        }
        
        // Scroll to bottom
        status.scrollTop = status.scrollHeight;
    }

    // Start loading process
    document.addEventListener('DOMContentLoaded', function() {
        updateStatus('🚀 Starting CORB-resistant loading test...', 'info');
        
        // Start CSS loading
        loadFullCalendarCSS();
        
        // Start JS loading after a short delay
        setTimeout(() => {
            loadFullCalendarJS();
        }, 1000);
    });
    </script>
</body>
</html>

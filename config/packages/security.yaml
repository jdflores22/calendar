security:
    # https://symfony.com/doc/current/security.html#registering-the-user-hashing-passwords
    password_hashers:
        App\Entity\User:
            algorithm: 'argon2id'
            memory_cost: 65536
            time_cost: 4

    # https://symfony.com/doc/current/security.html#loading-the-user-the-user-provider
    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    role_hierarchy:
        ROLE_ADMIN: [ROLE_OSEC, ROLE_EO, ROLE_DIVISION, ROLE_PROVINCE, ROLE_USER]
        ROLE_OSEC: [ROLE_EO, ROLE_DIVISION, ROLE_PROVINCE, ROLE_USER]
        ROLE_EO: [ROLE_DIVISION, ROLE_PROVINCE, ROLE_USER]
        ROLE_DIVISION: [ROLE_PROVINCE, ROLE_USER]
        ROLE_PROVINCE: [ROLE_USER]

    firewalls:
        dev:
            # Ensure dev tools and static assets are always allowed
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        
        api:
            pattern: ^/api/
            stateless: true
            provider: app_user_provider
            json_login:
                check_path: /api/login
                username_path: email
                password_path: password
                success_handler: App\Security\ApiAuthenticationSuccessHandler
                failure_handler: App\Security\ApiAuthenticationFailureHandler
            
        main:
            lazy: true
            provider: app_user_provider
            form_login:
                login_path: app_login
                check_path: app_login
                default_target_path: app_dashboard
                always_use_default_target_path: false
                enable_csrf: true
            logout:
                path: app_logout
                target: app_login
                invalidate_session: true
                delete_cookies:
                    PHPSESSID: { path: null, domain: null }
            remember_me:
                secret: '%kernel.secret%'
                lifetime: 604800 # 1 week
                path: /
                always_remember_me: false

            # Rate limiting for authentication attempts
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'

    # Note: Only the *first* matching rule is applied
    access_control:
        - { path: ^/login, roles: PUBLIC_ACCESS }
        - { path: ^/register, roles: PUBLIC_ACCESS }
        - { path: ^/verify, roles: PUBLIC_ACCESS }
        - { path: ^/reset-password, roles: PUBLIC_ACCESS }
        - { path: ^/api/login, roles: PUBLIC_ACCESS }
        - { path: ^/$, roles: PUBLIC_ACCESS }
        - { path: ^/home$, roles: PUBLIC_ACCESS }
        - { path: ^/api, roles: ROLE_USER }
        - { path: ^/admin, roles: ROLE_ADMIN }
        - { path: ^/directory, roles: ROLE_ADMIN }
        - { path: ^/form-builder, roles: ROLE_ADMIN }
        - { path: ^/, roles: ROLE_USER }

when@test:
    security:
        password_hashers:
            # Password hashers are resource-intensive by design to ensure security.
            # In tests, it's safe to reduce their cost to improve performance.
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4 # Lowest possible value for bcrypt
                time_cost: 3 # Lowest possible value for argon
                memory_cost: 10 # Lowest possible value for argon

<!DOCTYPE html>
<html>
<head>
    <title>Calendar Debug</title>
</head>
<body>
    <h1>Calendar Debug - February 2026</h1>
    <div id="debug"></div>
    
    <script>
        // Test February 1, 2026
        const feb1_2026 = new Date(2026, 1, 1); // February 1, 2026
        const dayOfWeek = feb1_2026.getDay(); // 0=Sunday, 1=Monday, etc.
        
        const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        
        let debugInfo = `
            <h2>February 1, 2026 Analysis:</h2>
            <p><strong>Date:</strong> ${feb1_2026}</p>
            <p><strong>Day of week (raw):</strong> ${dayOfWeek} (${dayNames[dayOfWeek]})</p>
            <p><strong>Adjusted for Monday-first:</strong> ${dayOfWeek === 0 ? 6 : dayOfWeek - 1}</p>
            
            <h2>Calendar Grid Simulation:</h2>
            <table border="1" style="border-collapse: collapse;">
                <tr>
                    <th>Mon</th><th>Tue</th><th>Wed</th><th>Thu</th><th>Fri</th><th>Sat</th><th>Sun</th>
                </tr>
        `;
        
        // Simulate calendar grid
        const year = 2026;
        const month = 1; // February (0-indexed)
        const firstDayOfMonth = new Date(year, month, 1);
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        
        // Get what day of week the 1st falls on
        let startDay = firstDayOfMonth.getDay();
        // Convert to Monday=0, Tuesday=1, ..., Sunday=6
        startDay = startDay === 0 ? 6 : startDay - 1;
        
        debugInfo += `<p><strong>Start day (Monday=0):</strong> ${startDay}</p>`;
        
        // Previous month days
        const prevMonth = new Date(year, month - 1, 1);
        const daysInPrevMonth = new Date(year, month, 0).getDate();
        
        let cells = [];
        
        // Add previous month's trailing days
        for (let i = startDay - 1; i >= 0; i--) {
            const day = daysInPrevMonth - i;
            cells.push(`<td style="background-color: #f0f0f0;">${day}</td>`);
        }
        
        // Add current month days
        for (let day = 1; day <= daysInMonth; day++) {
            const style = day === 1 ? 'background-color: yellow; font-weight: bold;' : '';
            cells.push(`<td style="${style}">${day}</td>`);
        }
        
        // Fill remaining cells
        let nextDay = 1;
        while (cells.length < 42) { // 6 rows × 7 days
            cells.push(`<td style="background-color: #f0f0f0;">${nextDay}</td>`);
            nextDay++;
        }
        
        // Create table rows
        for (let i = 0; i < 6; i++) {
            debugInfo += '<tr>';
            for (let j = 0; j < 7; j++) {
                debugInfo += cells[i * 7 + j];
            }
            debugInfo += '</tr>';
        }
        
        debugInfo += '</table>';
        debugInfo += '<p><strong>Yellow cell should be February 1st in the correct position</strong></p>';
        
        document.getElementById('debug').innerHTML = debugInfo;
    </script>
</body>
</html>

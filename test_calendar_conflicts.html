<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Conflict Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">Calendar Conflict Detection Test</h1>
        
        <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Test Results</h2>
            <div id="testResults" class="space-y-4">
                <div class="flex items-center space-x-2">
                    <div class="w-4 h-4 bg-yellow-400 rounded-full animate-pulse"></div>
                    <span class="text-gray-600">Running tests...</span>
                </div>
            </div>
        </div>
        
        <div class="bg-white rounded-lg shadow-lg p-6">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Calendar Events</h2>
            <div id="eventsContainer" class="space-y-2">
                <div class="text-gray-500">Loading events...</div>
            </div>
        </div>
    </div>

    <script>
        async function testCalendarAPI() {
            const results = document.getElementById('testResults');
            const eventsContainer = document.getElementById('eventsContainer');
            
            try {
                // Test 1: Load events
                results.innerHTML += `
                    <div class="flex items-center space-x-2">
                        <div class="w-4 h-4 bg-blue-400 rounded-full"></div>
                        <span class="text-gray-600">Testing event loading...</span>
                    </div>
                `;
                
                const eventsResponse = await fetch('http://127.0.0.1:8000/calendar/events?start=2026-02-01&end=2026-02-28');
                const events = await eventsResponse.json();
                
                results.innerHTML += `
                    <div class="flex items-center space-x-2">
                        <div class="w-4 h-4 bg-green-400 rounded-full"></div>
                        <span class="text-gray-600">✓ Events loaded: ${events.length} events found</span>
                    </div>
                `;
                
                // Display events
                if (events.length > 0) {
                    eventsContainer.innerHTML = events.map(event => `
                        <div class="p-3 border border-gray-200 rounded-lg">
                            <div class="flex items-center justify-between">
                                <div>
                                    <h3 class="font-medium text-gray-900">${event.title}</h3>
                                    <p class="text-sm text-gray-500">${new Date(event.start).toLocaleString()}</p>
                                    ${event.extendedProps?.hasConflicts ? `
                                        <span class="inline-flex items-center rounded-md bg-red-400/10 px-2 py-1 text-xs font-medium text-red-500 ring-1 ring-inset ring-red-400/20 mt-1">
                                            <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20">
                                                <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                                            </svg>
                                            ${event.extendedProps.conflictCount} conflict${event.extendedProps.conflictCount > 1 ? 's' : ''}
                                        </span>
                                    ` : `
                                        <span class="inline-flex items-center rounded-md bg-green-400/10 px-2 py-1 text-xs font-medium text-green-600 ring-1 ring-inset ring-green-400/20 mt-1">
                                            No conflicts
                                        </span>
                                    `}
                                </div>
                                <div class="text-right">
                                    <span class="inline-flex items-center rounded-md bg-${event.extendedProps?.priority === 'high' ? 'red' : event.extendedProps?.priority === 'medium' ? 'yellow' : 'blue'}-400/10 px-2 py-1 text-xs font-medium text-${event.extendedProps?.priority === 'high' ? 'red' : event.extendedProps?.priority === 'medium' ? 'yellow' : 'blue'}-600 ring-1 ring-inset ring-${event.extendedProps?.priority === 'high' ? 'red' : event.extendedProps?.priority === 'medium' ? 'yellow' : 'blue'}-400/20">
                                        ${event.extendedProps?.priority || 'normal'} priority
                                    </span>
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    eventsContainer.innerHTML = '<div class="text-gray-500">No events found for February 2026</div>';
                }
                
                // Test 2: Check for conflicts with overlapping times
                results.innerHTML += `
                    <div class="flex items-center space-x-2">
                        <div class="w-4 h-4 bg-blue-400 rounded-full"></div>
                        <span class="text-gray-600">Testing conflict detection...</span>
                    </div>
                `;
                
                const conflictResponse = await fetch('http://127.0.0.1:8000/events/api/check-conflicts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: JSON.stringify({
                        start: '2026-02-02T10:00:00',
                        end: '2026-02-02T11:00:00'
                    })
                });
                
                const conflictData = await conflictResponse.json();
                
                if (conflictData.success) {
                    results.innerHTML += `
                        <div class="flex items-center space-x-2">
                            <div class="w-4 h-4 bg-${conflictData.has_conflicts ? 'red' : 'green'}-400 rounded-full"></div>
                            <span class="text-gray-600">✓ Conflict detection working: ${conflictData.has_conflicts ? `${conflictData.conflict_count} conflicts found` : 'No conflicts'}</span>
                        </div>
                    `;
                } else {
                    results.innerHTML += `
                        <div class="flex items-center space-x-2">
                            <div class="w-4 h-4 bg-red-400 rounded-full"></div>
                            <span class="text-gray-600">✗ Conflict detection failed: ${conflictData.message}</span>
                        </div>
                    `;
                }
                
                // Test 3: Load offices
                results.innerHTML += `
                    <div class="flex items-center space-x-2">
                        <div class="w-4 h-4 bg-blue-400 rounded-full"></div>
                        <span class="text-gray-600">Testing office loading...</span>
                    </div>
                `;
                
                const officesResponse = await fetch('http://127.0.0.1:8000/calendar/offices');
                const offices = await officesResponse.json();
                
                results.innerHTML += `
                    <div class="flex items-center space-x-2">
                        <div class="w-4 h-4 bg-green-400 rounded-full"></div>
                        <span class="text-gray-600">✓ Offices loaded: ${offices.length} offices found</span>
                    </div>
                `;
                
                results.innerHTML += `
                    <div class="flex items-center space-x-2 mt-4 p-3 bg-green-50 border border-green-200 rounded-lg">
                        <div class="w-4 h-4 bg-green-500 rounded-full"></div>
                        <span class="text-green-800 font-medium">All tests completed successfully!</span>
                    </div>
                `;
                
            } catch (error) {
                console.error('Test failed:', error);
                results.innerHTML += `
                    <div class="flex items-center space-x-2 mt-4 p-3 bg-red-50 border border-red-200 rounded-lg">
                        <div class="w-4 h-4 bg-red-500 rounded-full"></div>
                        <span class="text-red-800 font-medium">Test failed: ${error.message}</span>
                    </div>
                `;
            }
        }
        
        // Run tests when page loads
        document.addEventListener('DOMContentLoaded', testCalendarAPI);
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conflict Detection Debug</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-4xl mx-auto">
        <h1 class="text-3xl font-bold mb-8">Conflict Detection Debug</h1>
        
        <div class="bg-white rounded-lg shadow p-6 mb-6">
            <h2 class="text-xl font-semibold mb-4">Test Conflict Detection</h2>
            
            <div class="grid grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium mb-2">Start Time</label>
                    <input type="datetime-local" id="startTime" class="w-full border rounded px-3 py-2">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-2">End Time</label>
                    <input type="datetime-local" id="endTime" class="w-full border rounded px-3 py-2">
                </div>
            </div>
            
            <button onclick="checkConflicts()" class="bg-blue-500 text-white px-4 py-2 rounded hover:bg-blue-600">
                Check Conflicts
            </button>
        </div>
        
        <div id="results" class="bg-white rounded-lg shadow p-6">
            <h3 class="text-lg font-semibold mb-4">Results</h3>
            <div id="output" class="text-gray-600">Click "Check Conflicts" to test...</div>
        </div>
    </div>

    <script>
        // Set default values to current time
        const now = new Date();
        const start = new Date(now.getTime() + 60 * 60 * 1000); // 1 hour from now
        const end = new Date(now.getTime() + 2 * 60 * 60 * 1000); // 2 hours from now
        
        document.getElementById('startTime').value = start.toISOString().slice(0, 16);
        document.getElementById('endTime').value = end.toISOString().slice(0, 16);
        
        async function checkConflicts() {
            const startTime = document.getElementById('startTime').value;
            const endTime = document.getElementById('endTime').value;
            const output = document.getElementById('output');
            
            if (!startTime || !endTime) {
                output.innerHTML = '<div class="text-red-600">Please select both start and end times</div>';
                return;
            }
            
            output.innerHTML = '<div class="text-blue-600">Checking conflicts...</div>';
            
            try {
                const response = await fetch('http://127.0.0.1:8000/events/api/check-conflicts', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    credentials: 'include',
                    body: JSON.stringify({
                        start: startTime,
                        end: endTime
                    })
                });
                
                console.log('Response status:', response.status);
                console.log('Response headers:', response.headers);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('Response data:', data);
                
                let html = '<div class="space-y-4">';
                html += `<div><strong>Status:</strong> ${response.status}</div>`;
                html += `<div><strong>Success:</strong> ${data.success}</div>`;
                html += `<div><strong>Has Conflicts:</strong> ${data.has_conflicts}</div>`;
                html += `<div><strong>Conflict Count:</strong> ${data.conflict_count || 0}</div>`;
                
                if (data.warning_message) {
                    html += `<div><strong>Warning:</strong> ${data.warning_message}</div>`;
                }
                
                if (data.conflicts && data.conflicts.length > 0) {
                    html += '<div><strong>Conflicts:</strong><ul class="list-disc ml-6">';
                    data.conflicts.forEach(conflict => {
                        html += `<li>${conflict.title} (${conflict.start} - ${conflict.end})</li>`;
                    });
                    html += '</ul></div>';
                }
                
                html += '</div>';
                output.innerHTML = html;
                
            } catch (error) {
                console.error('Error:', error);
                output.innerHTML = `<div class="text-red-600">
                    <strong>Error:</strong> ${error.message}<br>
                    <small>Check browser console for more details</small>
                </div>`;
            }
        }
    </script>
</body>
</html>

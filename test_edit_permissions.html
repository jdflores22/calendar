<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Edit Permissions</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-6">
        <h1 class="text-2xl font-bold mb-6">Test Edit Permissions</h1>
        
        <div class="space-y-4">
            <div>
                <label for="eventId" class="block text-sm font-medium text-gray-700 mb-2">Event ID:</label>
                <input type="number" id="eventId" class="border border-gray-300 rounded-md px-3 py-2 w-full" placeholder="Enter event ID">
            </div>
            
            <div class="flex space-x-4">
                <button onclick="testPermissions()" class="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700">
                    Test Permissions
                </button>
                <button onclick="testEditRedirect()" class="bg-green-600 text-white px-4 py-2 rounded-md hover:bg-green-700">
                    Test Edit Redirect
                </button>
            </div>
        </div>
        
        <div id="results" class="mt-6 p-4 bg-gray-50 rounded-md hidden">
            <h3 class="font-semibold mb-2">Results:</h3>
            <div id="resultContent"></div>
        </div>
    </div>

    <script>
        async function testPermissions() {
            const eventId = document.getElementById('eventId').value;
            if (!eventId) {
                alert('Please enter an event ID');
                return;
            }
            
            const resultsDiv = document.getElementById('results');
            const contentDiv = document.getElementById('resultContent');
            
            try {
                const response = await fetch(`/events/${eventId}/edit`, {
                    method: 'HEAD',
                    credentials: 'same-origin',
                    headers: {
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });
                
                let message = '';
                let className = '';
                
                if (response.ok) {
                    message = `✅ Permission granted (Status: ${response.status})`;
                    className = 'text-green-600';
                } else if (response.status === 403) {
                    message = `❌ Access denied (Status: ${response.status})`;
                    className = 'text-red-600';
                } else if (response.status === 404) {
                    message = `❓ Event not found (Status: ${response.status})`;
                    className = 'text-yellow-600';
                } else {
                    message = `⚠️ Other error (Status: ${response.status})`;
                    className = 'text-orange-600';
                }
                
                contentDiv.innerHTML = `<p class="${className}">${message}</p>`;
                resultsDiv.classList.remove('hidden');
                
            } catch (error) {
                contentDiv.innerHTML = `<p class="text-red-600">❌ Network error: ${error.message}</p>`;
                resultsDiv.classList.remove('hidden');
            }
        }
        
        async function testEditRedirect() {
            const eventId = document.getElementById('eventId').value;
            if (!eventId) {
                alert('Please enter an event ID');
                return;
            }
            
            // This will actually redirect if permission is granted
            window.location.href = `/events/${eventId}/edit`;
        }
    </script>
</body>
</html>

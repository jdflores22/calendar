<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comprehensive Mobile Sidebar Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="min-h-screen">
        <!-- Mobile Sidebar Overlay (same structure as base template) -->
        <div id="mobile-sidebar-overlay" class="fixed inset-0 z-40 lg:hidden hidden">
            <div class="fixed inset-0 bg-black bg-opacity-50" onclick="toggleMobileSidebar()"></div>
            <div class="fixed inset-y-0 left-0 w-64 bg-slate-900 shadow-xl transform -translate-x-full transition-transform duration-300 ease-in-out" id="mobile-sidebar-panel">
                <!-- Mobile Sidebar Content -->
                <div class="flex flex-col h-full">
                    <!-- Close Button Header -->
                    <div class="flex items-center justify-end p-4 border-b border-slate-800">
                        <button onclick="toggleMobileSidebar()" class="p-2 text-slate-400 hover:text-white hover:bg-slate-800 rounded-lg">
                            <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
                            </svg>
                        </button>
                    </div>
                    
                    <!-- Sidebar Content -->
                    <div class="flex-1 p-4">
                        <h3 class="text-white text-lg font-semibold mb-4">Mobile Sidebar</h3>
                        <ul class="space-y-2">
                            <li><a href="#" class="block text-slate-300 hover:text-white py-2">Dashboard</a></li>
                            <li><a href="#" class="block text-slate-300 hover:text-white py-2">Calendar</a></li>
                            <li><a href="#" class="block text-slate-300 hover:text-white py-2">Events</a></li>
                            <li><a href="#" class="block text-slate-300 hover:text-white py-2">Profile</a></li>
                        </ul>
                    </div>
                </div>
            </div>
        </div>

        <!-- Main Content -->
        <div class="p-8">
            <h1 class="text-2xl font-bold mb-6">Comprehensive Mobile Sidebar Test</h1>
            
            <!-- Mobile Sidebar Toggle Button -->
            <button onclick="toggleMobileSidebar()" class="lg:hidden p-2 text-slate-600 hover:text-slate-900 hover:bg-slate-200 rounded-lg transition-colors duration-200 mb-4">
                <svg class="h-6 w-6" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16" />
                </svg>
            </button>

            <div class="bg-white rounded-lg shadow p-6">
                <h2 class="text-lg font-semibold mb-4">Test Results</h2>
                
                <div class="space-y-4">
                    <div class="flex items-center space-x-2">
                        <span id="functionStatus" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
                            Checking...
                        </span>
                        <span>toggleMobileSidebar function availability</span>
                    </div>
                    
                    <div class="flex items-center space-x-2">
                        <span id="elementsStatus" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
                            Checking...
                        </span>
                        <span>Mobile sidebar elements presence</span>
                    </div>
                    
                    <div class="flex items-center space-x-2">
                        <span id="globalStatus" class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-gray-100 text-gray-800">
                            Checking...
                        </span>
                        <span>Global window function availability</span>
                    </div>
                    
                    <div class="mt-4 p-4 bg-blue-50 rounded-lg">
                        <h3 class="text-sm font-semibold text-blue-900 mb-2">Test Scenarios:</h3>
                        <div class="space-y-2">
                            <button onclick="testDirectCall()" class="bg-blue-600 text-white px-3 py-1 rounded text-sm hover:bg-blue-700">
                                Test Direct Function Call
                            </button>
                            <button onclick="testWindowCall()" class="bg-green-600 text-white px-3 py-1 rounded text-sm hover:bg-green-700">
                                Test Window Function Call
                            </button>
                            <button onclick="testOnclickAttribute()" class="bg-purple-600 text-white px-3 py-1 rounded text-sm hover:bg-purple-700">
                                Test Onclick Attribute
                            </button>
                        </div>
                    </div>
                    
                    <div class="mt-4 p-4 bg-gray-50 rounded-lg">
                        <h3 class="text-sm font-semibold text-gray-900 mb-2">Console Output:</h3>
                        <div id="consoleOutput" class="text-xs font-mono text-gray-600 bg-white p-2 rounded border max-h-32 overflow-y-auto">
                            <!-- Console messages will appear here -->
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Capture console messages
        const consoleOutput = document.getElementById('consoleOutput');
        const originalLog = console.log;
        const originalWarn = console.warn;
        const originalError = console.error;
        
        function addToConsole(message, type = 'log') {
            const timestamp = new Date().toLocaleTimeString();
            const div = document.createElement('div');
            div.className = type === 'error' ? 'text-red-600' : type === 'warn' ? 'text-yellow-600' : 'text-gray-600';
            div.textContent = `[${timestamp}] ${message}`;
            consoleOutput.appendChild(div);
            consoleOutput.scrollTop = consoleOutput.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            addToConsole(args.join(' '), 'log');
        };
        
        console.warn = function(...args) {
            originalWarn.apply(console, args);
            addToConsole(args.join(' '), 'warn');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            addToConsole(args.join(' '), 'error');
        };

        // Base template function (simulated)
        function toggleMobileSidebar() {
            console.log('Base template toggleMobileSidebar called');
            const overlay = document.getElementById('mobile-sidebar-overlay');
            const panel = document.getElementById('mobile-sidebar-panel');
            
            if (!overlay || !panel) {
                console.warn('Mobile sidebar elements not found');
                return;
            }
            
            if (overlay.classList.contains('hidden')) {
                // Show sidebar
                console.log('Showing mobile sidebar');
                overlay.classList.remove('hidden');
                setTimeout(() => {
                    panel.classList.remove('-translate-x-full');
                }, 10);
            } else {
                // Hide sidebar
                console.log('Hiding mobile sidebar');
                panel.classList.add('-translate-x-full');
                setTimeout(() => {
                    overlay.classList.add('hidden');
                }, 300);
            }
        }

        // Event template fallback function (simulated)
        if (typeof toggleMobileSidebar === 'undefined') {
            console.log('Defining fallback toggleMobileSidebar function');
            function toggleMobileSidebar() {
                console.log('Fallback toggleMobileSidebar called');
                const overlay = document.getElementById('mobile-sidebar-overlay');
                const panel = document.getElementById('mobile-sidebar-panel');
                
                if (!overlay || !panel) {
                    console.warn('Mobile sidebar elements not found');
                    return;
                }
                
                if (overlay.classList.contains('hidden')) {
                    // Show sidebar
                    overlay.classList.remove('hidden');
                    setTimeout(() => {
                        panel.classList.remove('-translate-x-full');
                    }, 10);
                } else {
                    // Hide sidebar
                    panel.classList.add('-translate-x-full');
                    setTimeout(() => {
                        overlay.classList.add('hidden');
                    }, 300);
                }
            }
            
            // Make function globally available
            window.toggleMobileSidebar = toggleMobileSidebar;
        } else {
            console.log('toggleMobileSidebar already defined, skipping fallback');
        }

        // Test functions
        function testDirectCall() {
            console.log('Testing direct function call...');
            try {
                toggleMobileSidebar();
                console.log('✅ Direct call successful');
            } catch (error) {
                console.error('❌ Direct call failed:', error.message);
            }
        }
        
        function testWindowCall() {
            console.log('Testing window function call...');
            try {
                window.toggleMobileSidebar();
                console.log('✅ Window call successful');
            } catch (error) {
                console.error('❌ Window call failed:', error.message);
            }
        }
        
        function testOnclickAttribute() {
            console.log('Testing onclick attribute simulation...');
            try {
                // Simulate what happens when onclick="toggleMobileSidebar()" is executed
                const func = new Function('return toggleMobileSidebar')();
                func();
                console.log('✅ Onclick simulation successful');
            } catch (error) {
                console.error('❌ Onclick simulation failed:', error.message);
            }
        }

        // Test the implementation
        document.addEventListener('DOMContentLoaded', function() {
            console.log('DOM loaded, running tests...');
            
            const functionStatus = document.getElementById('functionStatus');
            const elementsStatus = document.getElementById('elementsStatus');
            const globalStatus = document.getElementById('globalStatus');
            
            // Check if function is available
            if (typeof toggleMobileSidebar === 'function') {
                functionStatus.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800';
                functionStatus.textContent = '✅ Available';
                console.log('✅ toggleMobileSidebar function is available');
            } else {
                functionStatus.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800';
                functionStatus.textContent = '❌ Missing';
                console.error('❌ toggleMobileSidebar function is missing');
            }
            
            // Check if elements exist
            const overlay = document.getElementById('mobile-sidebar-overlay');
            const panel = document.getElementById('mobile-sidebar-panel');
            
            if (overlay && panel) {
                elementsStatus.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800';
                elementsStatus.textContent = '✅ Found';
                console.log('✅ Mobile sidebar elements found');
            } else {
                elementsStatus.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800';
                elementsStatus.textContent = '❌ Missing';
                console.error('❌ Mobile sidebar elements missing');
            }
            
            // Check if function is available globally
            if (typeof window.toggleMobileSidebar === 'function') {
                globalStatus.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800';
                globalStatus.textContent = '✅ Available';
                console.log('✅ window.toggleMobileSidebar is available');
            } else {
                globalStatus.className = 'inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800';
                globalStatus.textContent = '⚠️ Not Global';
                console.warn('⚠️ window.toggleMobileSidebar is not available');
            }
            
            console.log('Test initialization complete');
        });
    </script>
</body>
</html>

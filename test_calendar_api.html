<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar API Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-gray-900 mb-8">Calendar API & Conflict Detection Test</h1>
        
        <!-- Login Section -->
        <div id="loginSection" class="bg-white rounded-lg shadow-lg p-6 mb-8">
            <h2 class="text-xl font-semibold text-gray-800 mb-4">Login Required</h2>
            <form id="loginForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Email</label>
                    <input type="email" id="email" value="admin@tesda.gov.ph" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Password</label>
                    <input type="password" id="password" value="admin123" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                </div>
                <button type="submit" class="bg-indigo-600 text-white px-4 py-2 rounded-md hover:bg-indigo-700">Login</button>
            </form>
        </div>
        
        <!-- Test Results Section -->
        <div id="testSection" class="hidden">
            <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">Test Results</h2>
                <div id="testResults" class="space-y-4">
                    <div class="flex items-center space-x-2">
                        <div class="w-4 h-4 bg-yellow-400 rounded-full animate-pulse"></div>
                        <span class="text-gray-600">Ready to run tests...</span>
                    </div>
                </div>
            </div>
            
            <!-- Events Display -->
            <div class="bg-white rounded-lg shadow-lg p-6 mb-8">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">Calendar Events</h2>
                <div id="eventsContainer" class="space-y-2">
                    <div class="text-gray-500">No events loaded yet</div>
                </div>
            </div>
            
            <!-- Conflict Test -->
            <div class="bg-white rounded-lg shadow-lg p-6">
                <h2 class="text-xl font-semibold text-gray-800 mb-4">Conflict Detection Test</h2>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700">Start Time</label>
                        <input type="datetime-local" id="testStart" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700">End Time</label>
                        <input type="datetime-local" id="testEnd" class="mt-1 block w-full border-gray-300 rounded-md shadow-sm focus:ring-indigo-500 focus:border-indigo-500">
                    </div>
                </div>
                <button onclick="testConflictDetection()" class="bg-red-600 text-white px-4 py-2 rounded-md hover:bg-red-700">Test Conflict Detection</button>
                <div id="conflictResults" class="mt-4"></div>
            </div>
        </div>
    </div>

    <script>
        let sessionCookie = '';
        
        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            try {
                // First get the login page to get CSRF token
                const loginPageResponse = await fetch('http://127.0.0.1:8000/login');
                const loginPageText = await loginPageResponse.text();
                
                // Extract CSRF token from the login page
                const csrfMatch = loginPageText.match(/name="_token"[^>]*value="([^"]+)"/);
                const csrfToken = csrfMatch ? csrfMatch[1] : '';
                
                if (!csrfToken) {
                    throw new Error('Could not find CSRF token');
                }
                
                // Perform login
                const formData = new FormData();
                formData.append('email', email);
                formData.append('password', password);
                formData.append('_token', csrfToken);
                
                const loginResponse = await fetch('http://127.0.0.1:8000/login', {
                    method: 'POST',
                    body: formData,
                    credentials: 'include'
                });
                
                if (loginResponse.ok) {
                    // Login successful, show test section
                    document.getElementById('loginSection').classList.add('hidden');
                    document.getElementById('testSection').classList.remove('hidden');
                    
                    // Set default test times (tomorrow 9-10 AM)
                    const tomorrow = new Date();
                    tomorrow.setDate(tomorrow.getDate() + 1);
                    tomorrow.setHours(9, 0, 0, 0);
                    
                    const endTime = new Date(tomorrow);
                    endTime.setHours(10, 0, 0, 0);
                    
                    document.getElementById('testStart').value = tomorrow.toISOString().slice(0, 16);
                    document.getElementById('testEnd').value = endTime.toISOString().slice(0, 16);
                    
                    // Run tests
                    runTests();
                } else {
                    alert('Login failed. Please check credentials.');
                }
            } catch (error) {
                console.error('Login error:', error);
                alert('Login error: ' + error.message);
            }
        });
        
        async function runTests() {
            const results = document.getElementById('testResults');
            const eventsContainer = document.getElementById('eventsContainer');
            
            try {
                results.innerHTML = `
                    <div class="flex items-center space-x-2">
                        <div class="w-4 h-4 bg-blue-400 rounded-full"></div>
                        <span class="text-gray-600">Testing event loading...</span>
                    </div>
                `;
                
                // Test 1: Load events
                const eventsResponse = await fetch('http://127.0.0.1:8000/calendar/events?start=2026-02-01&end=2026-02-28', {
                    credentials: 'include',
                    headers: {
                        'Accept': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });
                
                if (!eventsResponse.ok) {
                    throw new Error(`Events API failed: ${eventsResponse.status}`);
                }
                
                const events = await eventsResponse.json();
                
                results.innerHTML += `
                    <div class="flex items-center space-x-2">
                        <div class="w-4 h-4 bg-green-400 rounded-full"></div>
                        <span class="text-gray-600">✓ Events loaded: ${events.length} events found</span>
                    </div>
                `;
                
                // Display events with conflict information
                if (events.length > 0) {
                    eventsContainer.innerHTML = events.map(event => `
                        <div class="p-4 border border-gray-200 rounded-lg ${event.extendedProps?.hasConflicts ? 'border-red-300 bg-red-50' : 'bg-white'}">
                            <div class="flex items-center justify-between">
                                <div class="flex-1">
                                    <h3 class="font-medium text-gray-900">${event.title}</h3>
                                    <p class="text-sm text-gray-500">${new Date(event.start).toLocaleString()}</p>
                                    <p class="text-xs text-gray-400">${event.extendedProps?.location || 'No location'}</p>
                                    
                                    <!-- Conflict Information -->
                                    ${event.extendedProps?.hasConflicts ? `
                                        <div class="mt-2">
                                            <span class="inline-flex items-center rounded-md bg-red-400/10 px-2 py-1 text-xs font-medium text-red-500 ring-1 ring-inset ring-red-400/20">
                                                <svg class="w-3 h-3 mr-1" fill="currentColor" viewBox="0 0 20 20">
                                                    <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                                                </svg>
                                                ${event.extendedProps.conflictCount} conflict${event.extendedProps.conflictCount > 1 ? 's' : ''}
                                            </span>
                                            ${event.extendedProps.conflicts && event.extendedProps.conflicts.length > 0 ? `
                                                <div class="mt-2 text-xs text-red-700">
                                                    <strong>Conflicts with:</strong>
                                                    ${event.extendedProps.conflicts.map(conflict => `
                                                        <div class="ml-2">• ${conflict.title} (${new Date(conflict.start).toLocaleTimeString()})</div>
                                                    `).join('')}
                                                </div>
                                            ` : ''}
                                        </div>
                                    ` : `
                                        <span class="inline-flex items-center rounded-md bg-green-400/10 px-2 py-1 text-xs font-medium text-green-600 ring-1 ring-inset ring-green-400/20 mt-2">
                                            No conflicts
                                        </span>
                                    `}
                                </div>
                                <div class="text-right">
                                    <span class="inline-flex items-center rounded-md bg-${getPriorityColor(event.extendedProps?.priority)}-400/10 px-2 py-1 text-xs font-medium text-${getPriorityColor(event.extendedProps?.priority)}-600 ring-1 ring-inset ring-${getPriorityColor(event.extendedProps?.priority)}-400/20">
                                        ${event.extendedProps?.priority || 'normal'} priority
                                    </span>
                                    ${event.extendedProps?.office ? `
                                        <div class="mt-1">
                                            <span class="inline-flex items-center rounded-md bg-indigo-400/10 px-2 py-1 text-xs font-medium text-indigo-600 ring-1 ring-inset ring-indigo-400/20">
                                                ${event.extendedProps.office.name}
                                            </span>
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    `).join('');
                } else {
                    eventsContainer.innerHTML = '<div class="text-gray-500">No events found for February 2026</div>';
                }
                
                // Test 2: Load offices
                results.innerHTML += `
                    <div class="flex items-center space-x-2">
                        <div class="w-4 h-4 bg-blue-400 rounded-full"></div>
                        <span class="text-gray-600">Testing office loading...</span>
                    </div>
                `;
                
                const officesResponse = await fetch('http://127.0.0.1:8000/calendar/offices', {
                    credentials: 'include',
                    headers: {
                        'Accept': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                });
                
                if (!officesResponse.ok) {
                    throw new Error(`Offices API failed: ${officesResponse.status}`);
                }
                
                const offices = await officesResponse.json();
                
                results.innerHTML += `
                    <div class="flex items-center space-x-2">
                        <div class="w-4 h-4 bg-green-400 rounded-full"></div>
                        <span class="text-gray-600">✓ Offices loaded: ${offices.length} offices found</span>
                    </div>
                `;
                
                results.innerHTML += `
                    <div class="flex items-center space-x-2 mt-4 p-3 bg-green-50 border border-green-200 rounded-lg">
                        <div class="w-4 h-4 bg-green-500 rounded-full"></div>
                        <span class="text-green-800 font-medium">All tests completed successfully!</span>
                    </div>
                `;
                
            } catch (error) {
                console.error('Test failed:', error);
                results.innerHTML += `
                    <div class="flex items-center space-x-2 mt-4 p-3 bg-red-50 border border-red-200 rounded-lg">
                        <div class="w-4 h-4 bg-red-500 rounded-full"></div>
                        <span class="text-red-800 font-medium">Test failed: ${error.message}</span>
                    </div>
                `;
            }
        }
        
        async function testConflictDetection() {
            const startTime = document.getElementById('testStart').value;
            const endTime = document.getElementById('testEnd').value;
            const resultsDiv = document.getElementById('conflictResults');
            
            if (!startTime || !endTime) {
                resultsDiv.innerHTML = `
                    <div class="p-3 bg-yellow-50 border border-yellow-200 rounded-lg">
                        <span class="text-yellow-800">Please select both start and end times</span>
                    </div>
                `;
                return;
            }
            
            try {
                resultsDiv.innerHTML = `
                    <div class="p-3 bg-blue-50 border border-blue-200 rounded-lg">
                        <span class="text-blue-800">Testing conflict detection...</span>
                    </div>
                `;
                
                const response = await fetch('http://127.0.0.1:8000/events/api/check-conflicts', {
                    method: 'POST',
                    credentials: 'include',
                    headers: {
                        'Content-Type': 'application/json',
                        'X-Requested-With': 'XMLHttpRequest'
                    },
                    body: JSON.stringify({
                        start: startTime,
                        end: endTime
                    })
                });
                
                if (!response.ok) {
                    throw new Error(`Conflict API failed: ${response.status}`);
                }
                
                const conflictData = await response.json();
                
                if (conflictData.success) {
                    if (conflictData.has_conflicts) {
                        resultsDiv.innerHTML = `
                            <div class="p-4 bg-red-50 border border-red-200 rounded-lg">
                                <div class="flex items-center space-x-2 mb-3">
                                    <svg class="w-5 h-5 text-red-500" fill="currentColor" viewBox="0 0 20 20">
                                        <path fill-rule="evenodd" d="M8.257 3.099c.765-1.36 2.722-1.36 3.486 0l5.58 9.92c.75 1.334-.213 2.98-1.742 2.98H4.42c-1.53 0-2.493-1.646-1.743-2.98l5.58-9.92zM11 13a1 1 0 11-2 0 1 1 0 012 0zm-1-8a1 1 0 00-1 1v3a1 1 0 002 0V6a1 1 0 00-1-1z" clip-rule="evenodd" />
                                    </svg>
                                    <span class="text-red-800 font-medium">Conflicts Detected!</span>
                                    <span class="inline-flex items-center rounded-md bg-red-400/10 px-2 py-1 text-xs font-medium text-red-500 ring-1 ring-inset ring-red-400/20">
                                        ${conflictData.conflict_count} conflict${conflictData.conflict_count > 1 ? 's' : ''}
                                    </span>
                                </div>
                                <p class="text-red-700 mb-3">${conflictData.warning_message}</p>
                                ${conflictData.conflicts && conflictData.conflicts.length > 0 ? `
                                    <div class="space-y-2">
                                        <h4 class="font-medium text-red-800">Conflicting Events:</h4>
                                        ${conflictData.conflicts.map(conflict => `
                                            <div class="bg-white p-3 rounded border border-red-200">
                                                <h5 class="font-medium text-gray-900">${conflict.title}</h5>
                                                <p class="text-sm text-gray-600">${new Date(conflict.start).toLocaleString()} - ${new Date(conflict.end).toLocaleTimeString()}</p>
                                                ${conflict.location ? `<p class="text-xs text-gray-500">📍 ${conflict.location}</p>` : ''}
                                                ${conflict.office ? `
                                                    <span class="inline-flex items-center rounded-md bg-indigo-400/10 px-2 py-1 text-xs font-medium text-indigo-600 ring-1 ring-inset ring-indigo-400/20 mt-1">
                                                        ${conflict.office.name}
                                                    </span>
                                                ` : ''}
                                            </div>
                                        `).join('')}
                                    </div>
                                ` : ''}
                                <div class="mt-3">
                                    <span class="inline-flex items-center rounded-md bg-${conflictData.can_override ? 'yellow' : 'gray'}-400/10 px-2 py-1 text-xs font-medium text-${conflictData.can_override ? 'yellow' : 'gray'}-600 ring-1 ring-inset ring-${conflictData.can_override ? 'yellow' : 'gray'}-400/20">
                                        ${conflictData.can_override ? 'Can Override' : 'Cannot Override'}
                                    </span>
                                </div>
                            </div>
                        `;
                    } else {
                        resultsDiv.innerHTML = `
                            <div class="p-3 bg-green-50 border border-green-200 rounded-lg">
                                <div class="flex items-center space-x-2">
                                    <svg class="w-5 h-5 text-green-500" fill="currentColor" viewBox="0 0 20 20">
                                        <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd" />
                                    </svg>
                                    <span class="text-green-800 font-medium">No Conflicts Found</span>
                                </div>
                                <p class="text-green-700 mt-1">The selected time slot is available.</p>
                            </div>
                        `;
                    }
                } else {
                    resultsDiv.innerHTML = `
                        <div class="p-3 bg-red-50 border border-red-200 rounded-lg">
                            <span class="text-red-800">Conflict detection failed: ${conflictData.message}</span>
                        </div>
                    `;
                }
                
            } catch (error) {
                console.error('Conflict test failed:', error);
                resultsDiv.innerHTML = `
                    <div class="p-3 bg-red-50 border border-red-200 rounded-lg">
                        <span class="text-red-800">Error: ${error.message}</span>
                    </div>
                `;
            }
        }
        
        function getPriorityColor(priority) {
            switch (priority) {
                case 'high': return 'red';
                case 'medium': return 'yellow';
                case 'low': return 'green';
                default: return 'blue';
            }
        }
    </script>
</body>
</html>

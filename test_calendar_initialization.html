<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Initialization Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
        .warning { color: orange; }
        #calendar { height: 400px; border: 1px solid #ccc; margin: 20px 0; }
        .log { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 3px; font-family: monospace; font-size: 12px; max-height: 300px; overflow-y: auto; }
    </style>
</head>
<body>
    <h1>Calendar Initialization Test</h1>
    
    <div class="test-section">
        <h2>Status</h2>
        <div id="status">Testing...</div>
    </div>
    
    <div class="test-section">
        <h2>Calendar</h2>
        <div id="calendar"></div>
    </div>
    
    <div class="test-section">
        <h2>Console Log</h2>
        <div id="console-log" class="log"></div>
    </div>

    <!-- FullCalendar CSS -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css' rel='stylesheet' />

    <script>
        // Console logging capture
        const originalLog = console.log;
        const originalWarn = console.warn;
        const originalError = console.error;
        
        function logToPage(message, type = 'log') {
            const logDiv = document.getElementById('console-log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div class="${type}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            logToPage(args.join(' '), 'success');
        };
        
        console.warn = function(...args) {
            originalWarn.apply(console, args);
            logToPage(args.join(' '), 'warning');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            logToPage(args.join(' '), 'error');
        };

        // Test the exact same structure as the calendar template
        function initializeFullCalendar() {
            const calendarEl = document.getElementById('calendar');
            
            if (!calendarEl) {
                console.error('Calendar element not found');
                return;
            }
            
            // Check if calendar is already initialized
            if (window.calendar && typeof window.calendar.render === 'function') {
                console.log('✅ Calendar already initialized');
                return;
            }
            
            let currentEvents = [];

            // Check if FullCalendar is available
            if (typeof FullCalendar === 'undefined') {
                console.error('FullCalendar library not loaded. Please check your internet connection.');
                const errorDiv = document.createElement('div');
                errorDiv.className = 'p-4 bg-red-50 border border-red-200 rounded-lg text-center';
                errorDiv.innerHTML = `
                    <div class="flex items-center justify-center space-x-2 text-red-600">
                        <span class="font-medium">Calendar failed to load</span>
                    </div>
                    <p class="text-sm text-red-600 mt-2">Please refresh the page or check your internet connection.</p>
                `;
                calendarEl.appendChild(errorDiv);
                document.getElementById('status').innerHTML = '<span class="error">❌ FullCalendar not available</span>';
                return;
            }

            try {
                console.log('✅ Initializing FullCalendar...');
                
                // Initialize FullCalendar with Philippine timezone
                window.calendar = new FullCalendar.Calendar(calendarEl, {
                    timeZone: 'Asia/Manila',
                    initialView: 'dayGridMonth',
                    firstDay: 1,
                    locale: 'en',
                    headerToolbar: {
                        left: 'prev,next today',
                        center: 'title',
                        right: 'dayGridMonth,timeGridWeek,timeGridDay'
                    },
                    height: 'auto',
                    aspectRatio: 1.35,
                    
                    // Test events
                    events: [
                        {
                            title: 'Test Event 1',
                            start: '2026-02-05',
                            backgroundColor: '#3b82f6'
                        },
                        {
                            title: 'Test Event 2',
                            start: '2026-02-10T10:00:00',
                            end: '2026-02-10T12:00:00',
                            backgroundColor: '#ef4444'
                        }
                    ],
                    
                    eventClick: function(info) {
                        console.log('Event clicked:', info.event.title);
                    },
                    
                    dateClick: function(info) {
                        console.log('Date clicked:', info.dateStr);
                    }
                });

                window.calendar.render();
                console.log('✅ Calendar initialized and rendered successfully');
                document.getElementById('status').innerHTML = '<span class="success">✅ Calendar initialized successfully</span>';
                
            } catch (error) {
                console.error('Error initializing calendar:', error);
                document.getElementById('status').innerHTML = '<span class="error">❌ Calendar initialization failed: ' + error.message + '</span>';
            }
        }

        function initializeCalendar() {
            if (typeof FullCalendar === 'undefined') {
                console.error('❌ FullCalendar not available for initialization');
                return;
            }
            
            console.log('✅ Initializing FullCalendar from fallback...');
            initializeFullCalendar();
        }

        // Initialize calendar when DOM is ready
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 DOM loaded, starting calendar initialization...');
            
            // Check if FullCalendar is available
            if (typeof FullCalendar === 'undefined') {
                document.getElementById('status').innerHTML = '<span class="warning">⚠️ Waiting for FullCalendar to load...</span>';
                
                // Wait a bit for FullCalendar to load
                setTimeout(() => {
                    if (typeof FullCalendar !== 'undefined') {
                        initializeFullCalendar();
                    } else {
                        document.getElementById('status').innerHTML = '<span class="error">❌ FullCalendar failed to load</span>';
                    }
                }, 2000);
            } else {
                initializeFullCalendar();
            }
        });
    </script>

    <!-- FullCalendar JavaScript -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js' 
            onload="console.log('✅ FullCalendar JS loaded'); if (document.readyState === 'complete') initializeFullCalendar();"
            onerror="console.error('❌ FullCalendar JS failed to load')"></script>
</body>
</html>

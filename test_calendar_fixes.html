<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar Fixes Test</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .test-section { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 5px; }
        .success { color: green; }
        .error { color: red; }
        .warning { color: orange; }
        #calendar { height: 400px; border: 1px solid #ccc; margin: 20px 0; }
        .log { background: #f5f5f5; padding: 10px; margin: 10px 0; border-radius: 3px; font-family: monospace; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Calendar JavaScript Fixes Test</h1>
    
    <div class="test-section">
        <h2>1. Function Definition Tests</h2>
        <div id="function-tests"></div>
    </div>
    
    <div class="test-section">
        <h2>2. CSS Fallback System Test</h2>
        <div id="css-tests"></div>
        <button onclick="testCSSFallback()">Test CSS Fallback</button>
    </div>
    
    <div class="test-section">
        <h2>3. Calendar Initialization Test</h2>
        <div id="calendar-tests"></div>
        <div id="calendar"></div>
        <button onclick="testCalendarInit()">Test Calendar Init</button>
    </div>
    
    <div class="test-section">
        <h2>4. Console Log</h2>
        <div id="console-log" class="log"></div>
    </div>

    <!-- FullCalendar CSS with Fallback -->
    <link href='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.css' 
          rel='stylesheet' id='fullcalendar-css-primary' 
          onerror="loadFullCalendarCSSFallback()" />

    <script>
        // Console logging capture
        const originalLog = console.log;
        const originalWarn = console.warn;
        const originalError = console.error;
        
        function logToPage(message, type = 'log') {
            const logDiv = document.getElementById('console-log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `<div class="${type}">[${timestamp}] ${message}</div>`;
            logDiv.scrollTop = logDiv.scrollHeight;
        }
        
        console.log = function(...args) {
            originalLog.apply(console, args);
            logToPage(args.join(' '), 'success');
        };
        
        console.warn = function(...args) {
            originalWarn.apply(console, args);
            logToPage(args.join(' '), 'warning');
        };
        
        console.error = function(...args) {
            originalError.apply(console, args);
            logToPage(args.join(' '), 'error');
        };

        // CSS Loading Variables
        let cssLoadAttempts = 0;
        let cssLoaded = false;

        // CSS Fallback Function - FIXED VERSION
        function loadFullCalendarCSSFallback() {
            cssLoadAttempts++;
            console.warn(`❌ FullCalendar CSS attempt ${cssLoadAttempts} failed`);
            
            if (cssLoadAttempts === 1) {
                // Try unpkg CDN as fallback
                console.log('🔄 Trying unpkg CDN fallback...');
                const fallbackLink = document.createElement('link');
                fallbackLink.rel = 'stylesheet';
                fallbackLink.href = 'https://unpkg.com/fullcalendar@6.1.15/index.global.min.css';
                fallbackLink.id = 'fullcalendar-css-fallback';
                fallbackLink.onerror = loadFullCalendarCSSFallback;
                fallbackLink.onload = function() {
                    cssLoaded = true;
                    console.log('✅ FullCalendar CSS loaded from unpkg fallback');
                };
                document.head.appendChild(fallbackLink);
            } else if (cssLoadAttempts === 2) {
                // Try cdnjs as second fallback
                console.log('🔄 Trying cdnjs fallback...');
                const fallbackLink2 = document.createElement('link');
                fallbackLink2.rel = 'stylesheet';
                fallbackLink2.href = 'https://cdnjs.cloudflare.com/ajax/libs/fullcalendar/6.1.15/index.global.min.css';
                fallbackLink2.id = 'fullcalendar-css-fallback2';
                fallbackLink2.onerror = loadFullCalendarCSSFallback;
                fallbackLink2.onload = function() {
                    cssLoaded = true;
                    console.log('✅ FullCalendar CSS loaded from cdnjs fallback');
                };
                document.head.appendChild(fallbackLink2);
            } else {
                // All CDNs failed, load minimal inline styles
                console.warn('⚠️ All FullCalendar CSS CDNs failed, loading minimal inline styles');
                loadMinimalCalendarStyles();
            }
        }

        function loadMinimalCalendarStyles() {
            const style = document.createElement('style');
            style.id = 'fullcalendar-minimal-styles';
            style.textContent = `
                .fc { 
                    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                    font-size: 14px;
                }
                .fc-header-toolbar { 
                    display: flex; 
                    justify-content: space-between; 
                    align-items: center; 
                    margin-bottom: 1rem;
                    padding: 1rem;
                    background: #f8fafc;
                    border-radius: 0.5rem;
                }
                .fc-toolbar-chunk { display: flex; align-items: center; gap: 0.5rem; }
                .fc-button { 
                    padding: 0.5rem 1rem; 
                    background: #3b82f6; 
                    color: white; 
                    border: none; 
                    border-radius: 0.375rem;
                    cursor: pointer;
                    font-size: 0.875rem;
                }
                .fc-button:hover { background: #2563eb; }
                .fc-daygrid-table { width: 100%; border-collapse: collapse; }
                .fc-col-header-cell { 
                    background: #f1f5f9; 
                    padding: 0.75rem; 
                    text-align: center; 
                    font-weight: 600;
                    border: 1px solid #e2e8f0;
                }
                .fc-daygrid-day { 
                    border: 1px solid #e2e8f0; 
                    min-height: 100px; 
                    vertical-align: top;
                }
                .fc-event { 
                    background: #3b82f6; 
                    color: white; 
                    padding: 0.25rem 0.5rem; 
                    margin: 0.125rem; 
                    border-radius: 0.25rem;
                    font-size: 0.75rem;
                    cursor: pointer;
                    border: none;
                }
                .fc-day-today { background: #fef3c7 !important; }
                .fc-scrollgrid { border: 1px solid #e2e8f0; border-radius: 0.5rem; overflow: hidden; }
            `;
            document.head.appendChild(style);
            cssLoaded = true;
            console.log('✅ Minimal FullCalendar styles loaded as fallback');
        }

        // JS Loading Variables
        let jsLoadAttempts = 0;
        let jsLoaded = false;

        // Calendar Initialization Function - FIXED VERSION
        function initializeFullCalendar() {
            const calendarEl = document.getElementById('calendar');
            
            if (!calendarEl) {
                console.error('Calendar element not found');
                return;
            }
            
            // Check if calendar is already initialized
            if (window.calendar && typeof window.calendar.render === 'function') {
                console.log('✅ Calendar already initialized');
                return;
            }
            
            // Check if FullCalendar is available
            if (typeof FullCalendar === 'undefined') {
                console.error('FullCalendar library not loaded');
                return;
            }

            try {
                console.log('✅ Initializing FullCalendar...');
                
                // Initialize FullCalendar
                window.calendar = new FullCalendar.Calendar(calendarEl, {
                    initialView: 'dayGridMonth',
                    headerToolbar: {
                        left: 'prev,next today',
                        center: 'title',
                        right: 'dayGridMonth'
                    },
                    height: 'auto',
                    events: [
                        {
                            title: 'Test Event',
                            start: '2026-02-05',
                            backgroundColor: '#3b82f6'
                        }
                    ]
                });

                window.calendar.render();
                console.log('✅ Calendar initialized successfully');
                
            } catch (error) {
                console.error('Error initializing calendar:', error);
            }
        }

        // Wrapper function for fallback initialization
        function initializeCalendar() {
            if (typeof FullCalendar === 'undefined') {
                console.error('❌ FullCalendar not available for initialization');
                return;
            }
            
            console.log('✅ Initializing FullCalendar from fallback...');
            initializeFullCalendar();
        }

        // Test Functions
        function testFunctions() {
            const results = document.getElementById('function-tests');
            let html = '';
            
            // Test function definitions
            const functions = [
                'loadFullCalendarCSSFallback',
                'loadMinimalCalendarStyles', 
                'initializeFullCalendar',
                'initializeCalendar'
            ];
            
            functions.forEach(funcName => {
                const exists = typeof window[funcName] === 'function';
                html += `<div class="${exists ? 'success' : 'error'}">
                    ${funcName}: ${exists ? '✅ Defined' : '❌ Missing'}
                </div>`;
            });
            
            results.innerHTML = html;
        }

        function testCSSFallback() {
            const results = document.getElementById('css-tests');
            results.innerHTML = '<div>Testing CSS fallback system...</div>';
            
            // Simulate CSS load failure
            cssLoadAttempts = 0;
            cssLoaded = false;
            
            try {
                loadFullCalendarCSSFallback();
                results.innerHTML += '<div class="success">✅ CSS fallback function executed without errors</div>';
            } catch (error) {
                results.innerHTML += `<div class="error">❌ CSS fallback error: ${error.message}</div>`;
            }
        }

        function testCalendarInit() {
            const results = document.getElementById('calendar-tests');
            results.innerHTML = '<div>Testing calendar initialization...</div>';
            
            try {
                initializeFullCalendar();
                results.innerHTML += '<div class="success">✅ Calendar initialization executed without errors</div>';
            } catch (error) {
                results.innerHTML += `<div class="error">❌ Calendar initialization error: ${error.message}</div>`;
            }
        }

        // Run tests on page load
        document.addEventListener('DOMContentLoaded', function() {
            console.log('🚀 Starting calendar fixes test...');
            testFunctions();
            
            // Test CSS loading
            setTimeout(() => {
                if (!cssLoaded) {
                    console.warn('Primary CSS not loaded, testing fallback...');
                    testCSSFallback();
                }
            }, 2000);
        });
    </script>

    <!-- FullCalendar JavaScript -->
    <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.15/index.global.min.js' 
            onload="jsLoaded = true; console.log('✅ FullCalendar JS loaded'); testCalendarInit();"
            onerror="console.error('❌ FullCalendar JS failed to load')"></script>
</body>
</html>

<!DOCTYPE html>
<html>
<head>
    <title>February 2026 Test</title>
</head>
<body>
    <h1>February 2026 Calendar Test</h1>
    <div id="result"></div>
    
    <script>
        // Test what day February 1, 2026 falls on
        const feb1_2026 = new Date(2026, 1, 1); // February 1, 2026
        const dayOfWeek = feb1_2026.getDay(); // 0=Sunday, 1=Monday, etc.
        
        const dayNames = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        
        let result = `
            <h2>February 1, 2026 Analysis:</h2>
            <p><strong>Date:</strong> ${feb1_2026.toDateString()}</p>
            <p><strong>Day of week:</strong> ${dayNames[dayOfWeek]} (${dayOfWeek})</p>
            <p><strong>For Monday-first calendar:</strong> Position ${dayOfWeek === 0 ? 6 : dayOfWeek - 1}</p>
            
            <h2>Calendar Grid (Monday-first):</h2>
            <table border="1" style="border-collapse: collapse; margin: 20px 0;">
                <tr style="background-color: #f0f0f0;">
                    <th style="padding: 10px;">Mon</th>
                    <th style="padding: 10px;">Tue</th>
                    <th style="padding: 10px;">Wed</th>
                    <th style="padding: 10px;">Thu</th>
                    <th style="padding: 10px;">Fri</th>
                    <th style="padding: 10px;">Sat</th>
                    <th style="padding: 10px;">Sun</th>
                </tr>
        `;
        
        // Calculate calendar grid
        const year = 2026;
        const month = 1; // February (0-indexed)
        const firstDay = new Date(year, month, 1);
        const daysInMonth = new Date(year, month + 1, 0).getDate();
        const firstDayOfWeek = firstDay.getDay();
        
        // Calculate previous month cells needed
        const prevMonthCells = firstDayOfWeek === 0 ? 6 : firstDayOfWeek - 1;
        const prevMonthLastDay = new Date(year, month, 0).getDate();
        
        let cells = [];
        
        // Add previous month cells
        for (let i = prevMonthCells; i > 0; i--) {
            const day = prevMonthLastDay - i + 1;
            cells.push(`<td style="padding: 10px; background-color: #f9f9f9; color: #999;">${day}</td>`);
        }
        
        // Add current month cells
        for (let day = 1; day <= daysInMonth; day++) {
            const style = day === 1 ? 'padding: 10px; background-color: yellow; font-weight: bold;' : 'padding: 10px;';
            cells.push(`<td style="${style}">${day}</td>`);
        }
        
        // Fill remaining cells
        let nextDay = 1;
        while (cells.length < 42) {
            cells.push(`<td style="padding: 10px; background-color: #f9f9f9; color: #999;">${nextDay}</td>`);
            nextDay++;
        }
        
        // Create table rows
        for (let i = 0; i < 6; i++) {
            result += '<tr>';
            for (let j = 0; j < 7; j++) {
                result += cells[i * 7 + j];
            }
            result += '</tr>';
        }
        
        result += '</table>';
        result += '<p><strong>Yellow cell = February 1st (should be in correct position)</strong></p>';
        result += `<p><strong>Previous month cells needed:</strong> ${prevMonthCells}</p>`;
        result += `<p><strong>Days in February 2026:</strong> ${daysInMonth}</p>`;
        
        document.getElementById('result').innerHTML = result;
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Office Color Auto-Detection Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 p-8">
    <h1 class="text-2xl font-bold mb-6">Office Color Auto-Detection Test</h1>
    
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-6">
        <h2 class="text-lg font-semibold mb-4">Event Edit Form - Office Color Demo</h2>
        
        <div class="space-y-6">
            <!-- Office Selection -->
            <div>
                <label for="office_id" class="block text-sm font-medium text-gray-700 mb-2">Office</label>
                <select name="office_id" id="office_id"
                        class="block w-full border-gray-300 rounded-lg shadow-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-sm py-3 px-4">
                    <option value="">Select an office</option>
                    <option value="1" data-color="#3B82F6" data-name="Regional Office IV-A (CALABARZON)">Regional Office IV-A (CALABARZON)</option>
                    <option value="2" data-color="#EF4444" data-name="Provincial Office - Batangas">Provincial Office - Batangas</option>
                    <option value="3" data-color="#10B981" data-name="Provincial Office - Cavite">Provincial Office - Cavite</option>
                    <option value="4" data-color="#F59E0B" data-name="Provincial Office - Laguna">Provincial Office - Laguna</option>
                    <option value="5" data-color="#8B5CF6" data-name="Provincial Office - Quezon">Provincial Office - Quezon</option>
                    <option value="6" data-color="#EC4899" data-name="Provincial Office - Rizal">Provincial Office - Rizal</option>
                </select>
            </div>

            <!-- Office Color Display -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Office Color</label>
                <div class="flex items-center space-x-3">
                    <div class="flex items-center space-x-2 p-2 bg-gray-50 rounded-md border border-gray-200 flex-1">
                        <div id="colorDisplay" class="w-6 h-6 rounded-full border-2 border-white shadow-sm" style="background-color: #007BFF;"></div>
                        <div class="flex flex-col min-w-0 flex-1">
                            <span id="colorLabel" class="text-xs font-medium text-gray-700 truncate">Default Blue</span>
                            <span id="colorCode" class="text-xs text-gray-500">#007BFF</span>
                        </div>
                    </div>
                    <input type="color" name="color" id="color"
                           value="#007BFF"
                           class="w-12 h-10 border-gray-300 rounded-md shadow-sm focus:ring-blue-500 focus:border-blue-500"
                           title="Custom color override">
                </div>
                <p class="mt-1 text-xs text-gray-500">Color is automatically set based on office selection. Use the color picker to override.</p>
            </div>

            <!-- Demo Event Preview -->
            <div class="mt-6 p-4 bg-gray-50 rounded-lg border">
                <h3 class="text-sm font-semibold text-gray-900 mb-3">Event Preview</h3>
                <div class="flex items-center space-x-3 p-3 bg-white rounded-lg border" id="eventPreview">
                    <div class="w-4 h-4 rounded-full" id="previewColor" style="background-color: #007BFF;"></div>
                    <div>
                        <div class="font-medium text-gray-900">Sample Event</div>
                        <div class="text-sm text-gray-600" id="previewOffice">No office selected</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Office color auto-detection functionality
        function updateOfficeColor() {
            const officeSelect = document.getElementById('office_id');
            const colorInput = document.getElementById('color');
            const colorDisplay = document.getElementById('colorDisplay');
            const colorLabel = document.getElementById('colorLabel');
            const colorCode = document.getElementById('colorCode');
            const previewColor = document.getElementById('previewColor');
            const previewOffice = document.getElementById('previewOffice');
            
            const selectedOption = officeSelect.options[officeSelect.selectedIndex];
            
            if (selectedOption && selectedOption.value) {
                // Office selected - use office color
                const officeColor = selectedOption.getAttribute('data-color') || '#007BFF';
                const officeName = selectedOption.getAttribute('data-name') || 'Selected Office';
                
                colorInput.value = officeColor;
                colorDisplay.style.backgroundColor = officeColor;
                colorLabel.textContent = officeName;
                colorCode.textContent = officeColor;
                previewColor.style.backgroundColor = officeColor;
                previewOffice.textContent = officeName;
                
                console.log('Office selected:', officeName, 'Color:', officeColor);
            } else {
                // No office selected - use default
                const defaultColor = '#007BFF';
                colorInput.value = defaultColor;
                colorDisplay.style.backgroundColor = defaultColor;
                colorLabel.textContent = 'Default Blue';
                colorCode.textContent = defaultColor;
                previewColor.style.backgroundColor = defaultColor;
                previewOffice.textContent = 'No office selected';
                
                console.log('No office selected, using default color:', defaultColor);
            }
        }

        // Handle office selection change
        document.getElementById('office_id').addEventListener('change', function() {
            console.log('Office selection changed to:', this.value);
            updateOfficeColor();
        });

        // Handle manual color picker changes
        document.getElementById('color').addEventListener('input', function() {
            const colorDisplay = document.getElementById('colorDisplay');
            const colorCode = document.getElementById('colorCode');
            const colorLabel = document.getElementById('colorLabel');
            const previewColor = document.getElementById('previewColor');
            
            colorDisplay.style.backgroundColor = this.value;
            colorCode.textContent = this.value;
            previewColor.style.backgroundColor = this.value;
            
            // Update label to indicate custom color
            const officeSelect = document.getElementById('office_id');
            const selectedOption = officeSelect.options[officeSelect.selectedIndex];
            
            if (selectedOption && selectedOption.value) {
                const officeName = selectedOption.getAttribute('data-name') || 'Selected Office';
                const officeColor = selectedOption.getAttribute('data-color') || '#007BFF';
                
                if (this.value.toLowerCase() !== officeColor.toLowerCase()) {
                    colorLabel.textContent = `${officeName} (Custom)`;
                } else {
                    colorLabel.textContent = officeName;
                }
            } else {
                colorLabel.textContent = 'Custom Color';
            }
            
            console.log('Manual color changed to:', this.value);
        });

        // Initialize on page load
        document.addEventListener('DOMContentLoaded', function() {
            updateOfficeColor();
            console.log('Office color auto-detection initialized');
        });
    </script>
</body>
</html>
